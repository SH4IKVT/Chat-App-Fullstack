<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface-2: #16161f;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.12);
      --text: #e8e4dc;
      --muted: #6b6870;
      --sent-bg: rgba(201,169,110,0.12);
      --sent-border: rgba(201,169,110,0.2);
      --recv-bg: #16161f;
      --recv-border: rgba(255,255,255,0.07);
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(201,169,110,0.04) 0%, transparent 65%);
      pointer-events: none;
    }

    .chat-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      height: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      animation: appear 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.97) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Corner accents */
    .chat-container::before,
    .chat-container::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--gold);
      border-style: solid;
      z-index: 2;
    }
    .chat-container::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .chat-container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* HEADER */
    .chat-header {
      padding: 20px 22px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .close-btn {
      width: 30px;
      height: 30px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .close-btn:hover { color: var(--text); border-color: var(--border-hover); }

    .header-info { flex: 1; }

    .usr-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .status-dot::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6fcf97;
      box-shadow: 0 0 6px rgba(111,207,151,0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* BODY */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-track { background: transparent; }
    .chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .message {
      max-width: 72%;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      border: 1px solid var(--recv-border);
      background: var(--recv-bg);
      color: var(--text);
      align-self: flex-start;
      animation: msgIn 0.25s ease both;
      position: relative;
    }

    .message.sent {
      background: var(--sent-bg);
      border-color: var(--sent-border);
      align-self: flex-end;
      color: var(--gold);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-time {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 4px;
      display: block;
      text-align: right;
    }

    .message.sent .message-time { text-align: right; }

    /* Date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .date-divider span {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* FOOTER */
    .chat-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(10px);
    }

    .chat-footer input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 11px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-footer input::placeholder { color: var(--muted); }
    .chat-footer input:focus { border-color: rgba(201,169,110,0.4); }

    .send-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--gold);
      color: #0a0a0f;
      border: none;
      padding: 11px 20px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <button class="close-btn">‹</button>
    <div class="header-info">
      <h3 class="usr-name">Marcus Williams</h3>
      <div class="status-dot">Online</div>
    </div>
  </div>

  <!-- Chat Body -->
  <div class="chat-body">

    <div class="date-divider"><span>Today</span></div>

    <div class="message">
      Hey, just checking in on your request status.
      <span class="message-time">10:24 AM</span>
    </div>

    <div class="message sent">
      It's been updated. Should be approved shortly.
      <span class="message-time">10:26 AM</span>
    </div>

    <div class="message">
      Perfect, thanks for the update!
      <span class="message-time">10:27 AM</span>
    </div>

    <div class="message sent">
      Let me know if you need anything else.
      <span class="message-time">10:28 AM</span>
    </div>

  </div>

  <!-- Footer -->
  <div class="chat-footer">
    <input type="text" placeholder="Type a message..." />
    <button class="send-btn">Send</button>
  </div>

</div>
</body>
</html>
