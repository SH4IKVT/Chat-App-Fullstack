<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface-2: #16161f;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.12);
      --text: #e8e4dc;
      --muted: #6b6870;
      --approved: #6fcf97;
      --approved-bg: rgba(111,207,151,0.08);
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(100,80,180,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,169,110,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .ud-container {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 28px 60px;
    }

    /* HEADER */
    .ud-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }

    .ud-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 300;
      letter-spacing: -0.01em;
    }

    .logout-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      padding: 8px 18px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .logout-btn:hover { color: var(--text); border-color: var(--border-hover); }

    /* USER CARD */
    .ud-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 36px;
      position: relative;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Gold top accent */
    .ud-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--gold), transparent);
    }

    .card-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .info-item label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
    }

    .info-item p {
      font-size: 13px;
      color: var(--text);
    }

    .ud-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .ud-row span:first-child {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--approved);
      background: var(--approved-bg);
      padding: 4px 12px;
    }

    /* USERS SECTION */
    .users-section { }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-header h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
    }

    .section-header .count {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .user-list {
      display: grid;
      gap: 8px;
    }

    .user-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .user-item:nth-child(1) { animation-delay: 0.05s; }
    .user-item:nth-child(2) { animation-delay: 0.10s; }
    .user-item:nth-child(3) { animation-delay: 0.15s; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .user-item:hover {
      border-color: var(--border-hover);
      background: var(--surface-2);
    }

    .user-info .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 400;
      margin-bottom: 2px;
    }

    .user-info .email {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .msg-btn {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      background: none;
      border: 1px solid rgba(201,169,110,0.25);
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .msg-btn:hover {
      background: var(--gold-dim);
      border-color: var(--gold);
    }

    .empty {
      font-size: 12px;
      color: var(--muted);
      padding: 28px;
      border: 1px solid var(--border);
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<div class="ud-container">

  <!-- Header -->
  <div class="ud-header">
    <h2>User Dashboard</h2>
    <button class="logout-btn">Logout</button>
  </div>

  <!-- User Info Card -->
  <div class="ud-card">
    <div class="card-label">Your Profile</div>
    <div class="info-grid">
      <div class="info-item">
        <label>Full Name</label>
        <p>Alexandra Chen</p>
      </div>
      <div class="info-item">
        <label>Email Address</label>
        <p>a.chen@domain.com</p>
      </div>
      <div class="info-item">
        <label>Access Role</label>
        <p>User</p>
      </div>
    </div>
    <div class="ud-row">
      <span>Account Status</span>
      <span class="status">Approved</span>
    </div>
  </div>

  <!-- Other Users -->
  <div class="users-section">
    <div class="section-header">
      <h3>Other Users</h3>
      <span class="count">3 members</span>
    </div>

    <div class="user-list">

      <div class="user-item">
        <div class="user-info">
          <p class="name">Marcus Williams</p>
          <p class="email">m.williams@domain.com</p>
        </div>
        <button class="msg-btn">Message</button>
      </div>

      <div class="user-item">
        <div class="user-info">
          <p class="name">Sophia Reyes</p>
          <p class="email">s.reyes@domain.com</p>
        </div>
        <button class="msg-btn">Message</button>
      </div>

      <div class="user-item">
        <div class="user-info">
          <p class="name">Daniel Park</p>
          <p class="email">d.park@domain.com</p>
        </div>
        <button class="msg-btn">Message</button>
      </div>

    </div>
  </div>

</div>
</body>
</html>
