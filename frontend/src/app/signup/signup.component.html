<div class="auth-container">

  <!-- POPUP -->
  <div *ngIf="showError" class="popup">
    {{ errorMsg }}
  </div>

  <div class="auth-card">

    <h2>Create Account</h2>

    <form (ngSubmit)="signup()">

      <input type="text"
             placeholder="First Name"
             [(ngModel)]="signupData.firstName"
             name="firstName"
             required />

      <input type="text"
             placeholder="Last Name"
             [(ngModel)]="signupData.lastName"
             name="lastName"
             required />

      <input type="email"
             placeholder="Email"
             [(ngModel)]="signupData.email"
             name="email"
             required />

      <input type="password"
             placeholder="Password"
             [(ngModel)]="signupData.password"
             name="password"
             required />

      <button type="submit">Register</button>

    </form>

    <p class="switch">
      Already have an account?
      <span (click)="router.navigate(['/'])">Login</span>
    </p>

  </div>
</div>
