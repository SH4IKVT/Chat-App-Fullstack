<div class="dashboard">

  <!-- HEADER (same as admin) -->
  <div class="dashboard-header">
    <div>
      <h2>Admin </h2>
      <p class="role">Role: {{role}}</p>
      <p><span class="welcome">Welcome, </span>Admin</p>
      <p class="admin-gmail">admin@gmail.com</p>
    </div>
      <button class="goback-btn" (click)="Back()">
      Back to Dashboard
    </button>
  </div>
  <h1>User Analytics</h1>
  
  <!-- BODY -->
  <div class="Piechart-section">
    <h2 class="section-title">Pie Chart</h2>
    <div class="chart-container">
      <canvas id="pieChart"></canvas>
    </div>
  </div>
<!-- 🔥 MESSAGE HISTORY SECTION -->
  <div class="message-history">

    <h2 class="section-title">Message History</h2>
    <p>Total Messages: {{messages.length}}</p>
    <div *ngIf="messages.length === 0" class="info-box">
      No messages found
    </div>

    <div class="table-container">

      <table class="msg-table">

        <thead>
          <tr>
            <th>Sender</th>
            <th>Receiver</th>
            <th>Message</th>
            <th>Time</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let msg of messages">
            <td>{{msg.senderEmail}}</td>
            <td>{{msg.receiverEmail}}</td>
            <td>{{msg.text}}</td>
            <td>{{msg.formattedTime}}</td>
          </tr>
        </tbody>

      </table>

    </div>

  </div>
  
</div>
